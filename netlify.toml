[build]
  command = "npm run build"
  publish = "dist"

# Proxy API → backend en Render (cambia la URL si tu servicio tiene otro nombre)
[[redirects]]
  from = "/api/*"
  to = "https://puente-zardain-api.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "https://puente-zardain-api.onrender.com/socket.io/:splat"
  status = 200
  force = true

# SPA — React Router (debe ir al final)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
